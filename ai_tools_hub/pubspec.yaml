name: ai_tools_hub
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.0
  shared_preferences: ^2.2.0
  url_launcher: ^6.3.0
  google_fonts: ^6.2.0
  flutter_native_splash: ^2.4.0
  share_plus: ^9.0.0
  app_links: ^6.0.0
  http: ^1.2.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter_native_splash:
  color: "#0A0E27"
  color_dark: "#0A0E27"
  image: assets/icon/app_icon.png
  image_dark: assets/icon/app_icon.png
  android_12:
    color: "#0A0E27"
    color_dark: "#0A0E27"
    image: assets/icon/app_icon.png
    image_dark: assets/icon/app_icon.png
  android: true
  ios: true
  fullscreen: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
